- project:
    check:
      jobs:
        - openstack-tox-linters
    gate:
      jobs:
        - openstack-tox-linters
    post:
      jobs:
        - stx-config-files-upload-git-mirror

- job:
    name: stx-config-files-upload-git-mirror
    parent: upload-git-mirror
